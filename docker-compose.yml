version: '3.8'

services:
  ai-calling-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-calling-agent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - SARVAM_VOICE_HINDI=${SARVAM_VOICE_HINDI:-ritu}
      - SARVAM_VOICE_ENGLISH=${SARVAM_VOICE_ENGLISH:-shubh}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - GOOGLE_LOCATION=${GOOGLE_LOCATION:-us-central1}
      - SMARTFLO_API_KEY=${SMARTFLO_API_KEY}
      - SMARTFLO_API_TOKEN=${SMARTFLO_API_TOKEN}
      - SMARTFLO_DID_NUMBER=${SMARTFLO_DID_NUMBER}
      - SMARTFLO_API_URL=${SMARTFLO_API_URL}
      - PUBLIC_URL=${PUBLIC_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ai-network
    volumes:
      - ./logs:/app/logs

networks:
  ai-network:
    driver: bridge

volumes:
  logs:
